services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: feedings
      POSTGRES_PASSWORD: feedings
      POSTGRES_DB: feedings
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    environment:
      DATABASE_URL: postgresql://feedings:feedings@db:5432/feedings
      AUTH_USERNAME: admin
      AUTH_PASSWORD: change-me
      SECRET_KEY: dev-secret-key
      SESSION_MAX_AGE: 2592000
      SESSION_SECURE: "false"
      TZ: America/Chicago
    ports:
      - "8000:8000"
    depends_on:
      - db
    restart: unless-stopped

volumes:
  postgres_data:
