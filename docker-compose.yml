services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: feedings
      POSTGRES_PASSWORD: feedings
      POSTGRES_DB: feedings
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U feedings"]
      interval: 2s
      timeout: 3s
      retries: 10

  app:
    build: .
    environment:
      DATABASE_URL: postgresql://feedings:feedings@db:5432/feedings
      AUTH_USERNAME: admin
      AUTH_PASSWORD: change-me
      SECRET_KEY: dev-secret-key
      SESSION_MAX_AGE: 2592000
      SESSION_SECURE: "false"
      TZ: America/Chicago
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
