{% extends "base.html" %}

{% block content %}
<section class="section">
  <h2>Add Feeding</h2>
  <form class="feeding-form" id="add-feeding-form" hx-post="/feedings" hx-target="#feeding-list" hx-swap="outerHTML" hx-on::after-request="this.reset(); setLocalTimestamp();">
    <div class="form-row">
      <label>
        Time
        <input type="datetime-local" name="timestamp" required>
      </label>
      <label>
        PO / by mouth or bottle (ml)
        <input type="number" name="po_amount" min="0" required>
      </label>
      <label>
        NG / by tube (ml)
        <input type="number" name="ng_amount" min="0" required>
      </label>
      <label>
        Notes
        <input type="text" name="notes" placeholder="Optional">
      </label>
    </div>
    <button type="submit">Save Feeding</button>
  </form>
</section>

<section class="section">
  <h2>Today's Feedings</h2>
  {% include "partials/feeding_list.html" %}
</section>

<section class="section">
  <h2>Last 14 Periods</h2>
  <canvas id="historyChart"></canvas>
</section>

<script>
  function setLocalTimestamp() {
    const input = document.querySelector('#add-feeding-form input[name="timestamp"]');
    if (!input) return;
    const now = new Date();
    now.setSeconds(0, 0);
    const offset = now.getTimezoneOffset() * 60000;
    const localISOTime = new Date(now.getTime() - offset).toISOString().slice(0, 16);
    input.value = localISOTime;
  }
  setLocalTimestamp();

  const ctx = document.getElementById('historyChart').getContext('2d');
  const chartData = {{ chart_data | tojson }};
  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: chartData.map(d => d.label),
      datasets: [
        {
          label: 'Total Volume (ml)',
          data: chartData.map(d => d.total),
          backgroundColor: 'rgba(54, 162, 235, 0.5)',
          yAxisID: 'y',
        },
        {
          label: 'Target (ml)',
          data: chartData.map(d => d.target),
          type: 'line',
          borderColor: 'rgba(255, 99, 132, 0.8)',
          borderWidth: 2,
          pointRadius: 0,
          fill: false,
          yAxisID: 'y',
        },
        {
          label: 'PO %',
          data: chartData.map(d => d.po_pct),
          type: 'line',
          borderColor: 'rgba(75, 192, 192, 1)',
          borderWidth: 2,
          yAxisID: 'y1',
        }
      ]
    },
    options: {
      responsive: true,
      interaction: { mode: 'index', intersect: false },
      scales: {
        y: {
          beginAtZero: true,
          title: { display: true, text: 'ml' }
        },
        y1: {
          position: 'right',
          beginAtZero: true,
          max: 100,
          title: { display: true, text: '%' }
        }
      }
    }
  });
</script>
{% endblock %}
