<div id="summary-cards" hx-swap-oob="true" class="summary-grid">
  <div class="summary-card">
    <div class="summary-label">Total / Target</div>
    <div class="summary-value">{{ summary.total }} / {{ summary.target }} ml</div>
  </div>
  <div class="summary-card">
    <div class="summary-label">PO Percentage</div>
    <div class="summary-value">{{ summary.po_pct }}%</div>
  </div>
  <div class="summary-card">
    <div class="summary-label">Remaining</div>
    <div class="summary-value">{{ summary.remaining }} ml</div>
  </div>
  <div class="summary-card">
    <div class="summary-label">PO / NG</div>
    <div class="summary-value">{{ summary.po }} / {{ summary.ng }} ml</div>
  </div>
</div>
