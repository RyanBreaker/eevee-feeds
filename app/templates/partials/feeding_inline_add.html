{% if is_current %}
<tr id="feeding-inline-add" class="feeding-inline-add">
  <td>
    <input type="datetime-local" name="timestamp" value="{{ now.strftime('%Y-%m-%dT%H:%M') }}" required form="inline-add-form">
  </td>
  <td>
    <input type="number" id="inline-po-amount" name="po_amount" min="0" step="1" required form="inline-add-form" placeholder="PO">
  </td>
  <td>
    <input type="number" id="inline-ng-amount" name="ng_amount" min="0" step="1" required form="inline-add-form" placeholder="NG">
  </td>
  <td>
    <input type="number" id="inline-total" min="0" step="1" readonly form="inline-add-form" placeholder="Total" tabindex="-1">
  </td>
  <td></td>
  <td></td>
  <td></td>
  <td>
    <input type="text" name="notes" form="inline-add-form" placeholder="Notes">
  </td>
  <td class="actions">
    <form id="inline-add-form"
          hx-post="/feedings"
          hx-target="#feeding-list"
          hx-swap="outerHTML"
          hx-on::after-request="document.getElementById('inline-po-amount').focus()">
      <button type="submit">Add</button>
    </form>
    {% if inline_error %}
    <div class="inline-error">{{ inline_error }}</div>
    {% endif %}
  </td>
</tr>
{% endif %}
